apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: network
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: network
  hostnames:
    - echo.kadenzobel.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          namespace: default  # <--- Added this to find your app
          port: 80           # <--- Changed from 8080 to match your 'kubectl get svc'
