apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: network
spec:
  parentRefs:
    - name: envoy-internal  # <--- This matches your kubectl get gateways output
      namespace: network
  hostnames:
    - echo.kadenzobel.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          namespace: default
          port: 80
