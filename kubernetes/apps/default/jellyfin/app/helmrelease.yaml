---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin # Ensure your ocirepository.yaml points to bjw-s-labs app-template 4.6.2
  interval: 1h
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/jellyfin/jellyfin
              tag: 10.10.6 # Latest stable as of early 2026
            env:
              TZ: America/Denver
              JELLYFIN_PublishedServerUrl: "https://jellyfin.kadenzobel.com"
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 4Gi
                # IF USING THE INTEL DEVICE PLUGIN on Talos, uncomment the line below:
                # gpu.intel.com/i915: 1

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # Talos 'render' group ID is usually 44 or 104.
        # This is required for the pod to access /dev/dri for hardware transcoding.
        supplementalGroups: [44, 104, 10000]

    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: 8096

    route:
      app:
        enabled: true
        hostnames:
          - "jellyfin.kadenzobel.com"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      # Stores your metadata, watch history, and server config
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /config

      # Your Media Library mounted directly via NFS
      media:
        type: nfs
        server: 192.168.X.X  # <-- CHANGE THIS: Your NFS Server IP
        path: /path/to/share # <-- CHANGE THIS: Your NFS Export Path
        globalMounts:
          - path: /media
            readOnly: true   # Keeps Jellyfin from accidentally deleting your files

      # Passes the GPU for hardware acceleration (if NOT using the Intel Device Plugin)
      transcode-device:
        type: hostPath
        hostPath: /dev/dri/renderD128
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/dri/renderD128