---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  # CHANGE THIS SECTION:
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s        # This refers to the global bjw-s repo
        namespace: flux-system
  interval: 1h
  values:
    controllers:
      filebrowser:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/filebrowser/filebrowser
              tag: v2.32.0
            env:
              TZ: America/Denver
              FB_BASEURL: /
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: filebrowser
        ports:
          http:
            port: 80

    route:
      app:
        enabled: true
        hostnames:
          - "filebrowser.kadenzobel.com"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      config:
        type: emptyDir
      data:
        type: emptyDir
        globalMounts:
          - path: /srv
