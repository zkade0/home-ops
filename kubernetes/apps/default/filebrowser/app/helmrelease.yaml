---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  chartRef:
    kind: OCIRepository
    name: filebrowser
  interval: 1h
  values:
    controllers:
      filebrowser:
        containers:
          app:
            image:
              repository: docker.io/hurlenko/filebrowser
              tag: latest
            env:
              TZ: America/Denver
              FB_PORT: 8080
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi

    service:
      app:
        controller: filebrowser
        ports:
          http:
            port: 8080

    route:
      app:
        enabled: true
        hostnames:
          - "filebrowser.kadenzobel.com"
        parentRefs:
          - name: envoy-external
            namespace: network

    # The hurlenko image expects /data and /config to exist
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      data:
        type: emptyDir
        globalMounts:
          - path: /data
